# Runs scripts/verify.ps1 on Windows (PowerShell + git + temp repos).
name: verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # windows-latest includes GitHub CLI; avoid winget here (flaky / PATH issues on runners).
      - name: GitHub CLI version
        shell: pwsh
        run: gh --version

      - name: Run verification script
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/verify.ps1 -RequireGh -StrictPr
